<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Inventory System{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        /* ✅ TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            background-color: #eaeaea;

        }

        /* ✅ LEFT: logo + home */
        .top-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* ✅ Logo */
        .logo {
            height: 50px;
            
        }

        /* ✅ Home Link */
        .home-link {
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            color: black;
        }

        /* ✅ RIGHT SIDE */
        .top-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* ✅ Logout Button */
        .logout-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background-color: #444;
            color: white;
            cursor: pointer;
        }

        .logout-btn:hover {
            background-color: #222;
        }

        /* ✅ MAIN CONTAINER */
        .container {
            width: 80%;
            margin: 20px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.08);
        }

        /* ✅ HEADINGS */
        h1 {
            text-align: center;
        }

        /* ✅ TABLES */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            padding: 10px;
            border-bottom: 2px solid #ccc;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f8f8f8;
        }

        /* ✅ BUTTONS */
        button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #34495e;
        }

        /* ✅ HOME PAGE LAYOUT */
        .home-row {
            display: flex;
            align-items: center;
            margin: 40px 0;
        }

        .home-btn {
            background-color: #d3d3d3;
            color: black;
            border-radius: 20px;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            min-width: 220px;
            text-align: center;
        }

        .home-btn:hover {
            background-color: #bbb;
        }

        .home-desc {
            margin-left: 40px;
            color: #444;
            max-width: 600px;
            line-height: 1.4;
        }

        /* ✅ FOOTER */
        .footer {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }

    </style>
</head>

<body>

    <!-- ✅ TOP BAR -->

    <div class="topbar"><div class="topbar (OPTIONAL HOME) -->
        <div class="top-left">
            <img src="{{ url_for('static', filename='jcf_logo.png') }}" class="logo">

            {% if session.get('department') %}
                <a href="/home-page" class="home-link">Home</a>
            {% endif %}
        </div>

        <!-- ✅ RIGHT SIDE -->
        <div class="top-right">

            {% if session.get('department') %}
                <span>Logged in as: {{ department }}</span>

                <form action="/logout" method="POST" style="display:inline;">
                    <button type="submit" class="logout-btn">Log Out</button>
                </form>
            {% endif %}

        </div>

    </div>


    <!-- ✅ MAIN CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- ✅ FOOTER -->
    <div class="footer">
        © 2026 JCF Software Services. All rights reserved.
    </div>

    <!-- ✅ SCRIPT -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
